<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
  <link rel="icon" href="/images/favi.png" type="image/png">
  <th:block th:insert="~{include/bs5}"></th:block>
  <th:block th:insert="~{include/nav}"></th:block>
  <script>
    'user strict';
    // 팝오버 초기화.
    $(() => {
      const popoverTriggerList = document.querySelectorAll('[data-bs-toggle="popover"]');
      const popoverList = [...popoverTriggerList].map(popoverTriggerEl => new bootstrap.Popover(popoverTriggerEl));
    });

    let currentDevice = "ENV_V2_1"; // 기본 선택

    // SSE 연결(Server-Sent Events / 실시간 서버-클라이언트 통신 기술)
    const eventSource = new EventSource("/sensor/sensorList/sse");

    /*
    document.onclick = mouseClick;
    function mouseClick(e) {
      console.log("마우스클릭 좌표 메소드");
      let x = e.clientX;
      let y = e.clientY;
      console.log("브라우저X: ",x);
      console.log("브라우저Y: ",y);

      setSensorPosition("sensor4", 0.16818181818181818, 0.18045454545454545);
    }
    */
    /* 절대좌표
      실내온도 상대습도 이산화탄소 유기화합물VOC
      미세먼지[PM1.0} 미세먼지[PM2.5} 미세먼지[PM10}
      온도_1 온도_2 온도_3 온도(비접촉)
      소음 조도
    */
    const abXY = [
      "0.481,0.180","0.458,0.462","0.640,0.935","0.168,0.180",
      "0.860,0.114","0.766,0.114","0.668,0.114",
      "0.748,0.728","0.748,0.612","0.748,0.493","0.640,0.834",
      "0.073,0.689","0.249,0.756"
    ];

    // SSE에서 값이 들어오면 실행.
    eventSource.onmessage = function(event) {
      const data = JSON.parse(event.data);
      const sensors = data.sensor;         // 리스트
      const threshold = data.threshold;

      const thresholdMap = {};
      threshold.forEach(t => {
        thresholdMap[t.deviceCode + "_" + t.sensorKey] = t;
      });

      console.log("받은 데이터", data);

      // 현재 선택된 deviceCode 찾기
      const target = sensors.find(s => s.deviceCode === currentDevice);
      console.log("target: ",target);
      if(!target) return;
      /*
      updateBox("value1", "실내온도", target.value1, thresholdMap[currentDevice + "_" + "value1"]);
      updateBox("value2", "상대습도", target.value2, thresholdMap[currentDevice + "_" + "value2"]);
      updateBox("value3", "이산화탄소", target.value3, thresholdMap[currentDevice + "_" + "value3"]);
      updateBox("value4", "유기화합물VOC", target.value4, thresholdMap[currentDevice + "_" + "value4"]);

      updateBox("value5", "초미세먼지 PM1.0", target.value5, thresholdMap[currentDevice + "_" + "value5"]);
      updateBox("value6", "초미세먼지 PM2.5", target.value6, thresholdMap[currentDevice + "_" + "value6"]);
      updateBox("value7", "초미세먼지 PM10", target.value7, thresholdMap[currentDevice + "_" + "value7"]);

      updateBox("value8", "온도_1", target.value8, thresholdMap[currentDevice + "_" + "value8"]);
      updateBox("value9", "온도_2", target.value9, thresholdMap[currentDevice + "_" + "value9"]);
      updateBox("value10", "온도_3", target.value10, thresholdMap[currentDevice + "_" + "value10"]);

      updateBox("value12", "소음", target.value12, thresholdMap[currentDevice + "_" + "value11"]);
      updateBox("value11", "온도(비접촉)", target.value11, thresholdMap[currentDevice + "_" + "value12"]);
      updateBox("value13", "노이즈", target.value13, thresholdMap[currentDevice + "_" + "value13"]);
      */
      let value = [
        target.value1,target.value2,target.value3,target.value4,target.value5,
        target.value6,target.value7,target.value8,target.value9,target.value10,
        target.value11,target.value12,target.value13
      ]
      for(let i=0; i<13; i++) {
        setSensor("sensor"+(i+1), value[i], thresholdMap[currentDevice + "_" + "value"+(i+1)], abXY[i]);
      }
    };

    // 센서 div에 class값 주기.
    function setSensor(id, value, threshold, abXY) {
      $("#"+id).get(0).className = "";
      $("#"+id).get(0).classList.remove("Alarm");
      if(threshold) {
        if(value >= threshold.alarm) $("#"+id).get(0).classList.add("Alarm");
        else if(value >= threshold.warning) $("#"+id).get(0).classList.add("Warning");
        else $("#"+id).get(0).classList.add("Normal");
      }
      else $("#"+id).get(0).classList.add("Normal");
      // 센서 이동.
      setSensorPosition(id, abXY);
    }

    // 센서 상세정보(새창).
    function newWindow(sensorID) {
      // 새창의 URL(컨트롤러 맵핑).
      let url = "/sensor/sensorNewWindow/"+sensorID;
      // 새창의 윈도우 이름. 있으면 중복되는 이름은 같은 창으로, 없으면 새창으로 뜬다.
      let windowName = "";
      // 새창 가로 크기.
      let windowWidth = 400;
      // 새창 세로 크기.
      let windowHeight = 700;
      // 새창이 뜨는 좌표. 현재는 브라우저 가운데에 뜬다.
      let x = window.screenX + (window.outerWidth - windowWidth) / 2;
      let y = window.screenY + (window.outerHeight - windowHeight) / 2;
      let option = `width=${windowWidth}, height=${windowHeight}, left=${x}, top=${y}, location=no`;
      // 새창 띄우기.
      window.open(url, windowName, option);
    }

    function setSensorPosition(id, abXY) {
      // 센서의 절대좌표 x, y값.
      let ab = abXY.split(",");
      // 현재 이미지의 정보.
      let rect = $("#myImg").get(0).getBoundingClientRect();

      // 절대좌표와 현재 이미지값으로 센서 좌표 산출.
      let x = ab[0] * rect.width;
      let y = ab[1] * rect.height;
      // 센서 위치 이동.
      $("#"+id).get(0).style.left = x+"px";
      $("#"+id).get(0).style.top = y+"px";
    }
  </script>
  <style>
    /*normal상태*/
    .Normal {
      position: absolute;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background-color: green;
      opacity: 0.5;
      transform: translate(-50%, -50%);
    }
    /*warning상태*/
    .Warning {
      position: absolute;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: yellow;
      opacity: 0.5;
      transform: translate(-50%, -50%);
    }
    /*alarm상태*/
    .Alarm {
      position: absolute;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: red;
      opacity: 0.5;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>
<div class="container text-center">
  <h2>센서현황</h2>
  <p></p>
  <div class="row">
    <div class="col border" style="max-width:20%">
      <div><a href="#">1층</a></div>
      <div><a href="#">2층</a></div>
      <div><a href="#">자재실</a></div>
      <div><a href="#">연구실</a></div>
    </div>
    <div class="col border">
      <div style="position: relative; display: inline-block;">
        <img src="/sensor/ENV_V2_1.png" id="myImg" style="max-width:100%; max-height:calc(100vh - 300px)" />
        <script>
          document.getElementById("myImg").addEventListener("click", function(e) {
            console.log("이미지 정보확인 메소드");
            // 현재 이미지의 x, y좌표와 이미지의 width, height 크기, 이미지의 top, bottom, right, left좌표를 얻는다.
            const rect = this.getBoundingClientRect();
            console.log("이미지좌표정보: ",rect);

            const clickX = e.clientX - rect.left;  // 이미지 내부 X
            const clickY = e.clientY - rect.top;   // 이미지 내부 Y
            console.log("클릭좌표X: ",clickX);
            console.log("클릭좌표Y: ",clickY);

            const ratioX = (clickX / rect.width).toFixed(3);
            const ratioY = (clickY / rect.height).toFixed(3);
            console.log("절대좌표X: ",ratioX);
            console.log("절대좌표Y: ",ratioY);

            const markerX = ratioX * rect.width;
            const markerY = ratioY * rect.height;
            console.log("X: ",markerX);
            console.log("Y: ",markerY);
          });
        </script>
        <a href="javascript:newWindow('sensor1')" id="sensor1" title="팝업창 제목(없어도 됨)" data-bs-content="팝업창 내용<br/><br/><br/><br/><br/><br/><br/><br/><br/><br/><br/><br/><br/><br/><br/><br/><br/><br/><br/>" data-bs-toggle="popover" data-bs-trigger="hover" data-bs-html="true"></a>
        <a id="sensor2" th:data-bs-content="${toDay}" data-bs-toggle="popover" data-bs-trigger="hover" data-bs-html="true"></a>
        <a id="sensor3" title="팝업창 제목(없어도 됨)" data-bs-content="" data-bs-toggle="popover" data-bs-trigger="hover" data-bs-html="true"></a>
        <a id="sensor4" title="팝업창 제목(없어도 됨)" data-bs-content="" data-bs-toggle="popover" data-bs-trigger="hover" data-bs-html="true"></a>
        <a id="sensor5" title="팝업창 제목(없어도 됨)" data-bs-content="" data-bs-toggle="popover" data-bs-trigger="hover" data-bs-html="true"></a>
        <a id="sensor6" title="팝업창 제목(없어도 됨)" data-bs-content="" data-bs-toggle="popover" data-bs-trigger="hover" data-bs-html="true"></a>
        <a id="sensor7" title="팝업창 제목(없어도 됨)" data-bs-content="" data-bs-toggle="popover" data-bs-trigger="hover" data-bs-html="true"></a>
        <a id="sensor8" title="팝업창 제목(없어도 됨)" data-bs-content="" data-bs-toggle="popover" data-bs-trigger="hover" data-bs-html="true"></a>
        <a id="sensor9" title="팝업창 제목(없어도 됨)" data-bs-content="" data-bs-toggle="popover" data-bs-trigger="hover" data-bs-html="true"></a>
        <a id="sensor10" title="팝업창 제목(없어도 됨)" data-bs-content="" data-bs-toggle="popover" data-bs-trigger="hover" data-bs-html="true"></a>
        <a id="sensor11" title="팝업창 제목(없어도 됨)" data-bs-content="" data-bs-toggle="popover" data-bs-trigger="hover" data-bs-html="true"></a>
        <a id="sensor12" title="팝업창 제목(없어도 됨)" data-bs-content="" data-bs-toggle="popover" data-bs-trigger="hover" data-bs-html="true"></a>
        <a id="sensor13" title="팝업창 제목(없어도 됨)" data-bs-content="" data-bs-toggle="popover" data-bs-trigger="hover" data-bs-html="true"></a>
      </div>
    </div>
  </div>
</div>
</body>
